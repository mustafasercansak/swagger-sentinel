openapi: 3.0.3
info:
  title: Swagger Sentinel API
  description: A professional-grade OpenAPI specification for Pet management that satisfies all 130 validation checks.
  version: 1.0.0
  termsOfService: https://api.example.com/terms
  contact:
    name: Mustafa Sercan Sak
    email: api@example.com
    url: https://api.example.com/support
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
externalDocs:
  description: Find more info here
  url: https://api.example.com/docs
servers:
  - url: https://api.example.com/v1
    description: Production server with secure HTTPS
tags:
  - name: Pets
    description: Operations related to pet management and lifecycle
paths:
  /pets:
    get:
      summary: List pets
      description: Returns a list of all pets in the store
      operationId: pets_list
      tags: [Pets]
      parameters:
        - name: limit
          in: query
          description: How many items to return at one time (max 100)
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: The number of items to skip before starting
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    maxItems: 100
                    items: { $ref: '#/components/schemas/Pet' }
              example:
                items: 
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: "Buddy"
                    type: "dog"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalError'
    head:
      summary: Check pets existence
      operationId: pets_check_all
      tags: [Pets]
      responses:
        '200':
          description: OK
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Create a pet
      description: Adds a new pet to the repository
      operationId: pets_create
      tags: [Pets]
      requestBody:
        description: Pet object to create
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
            example:
              id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              name: "Buddy"
              type: "dog"
      responses:
        '201':
          description: Created
          headers:
            Location:
              description: URL for the new resource
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                name: "Buddy"
                type: "dog"
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '415':
          $ref: '#/components/responses/UnsupportedMediaError'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  responses:
    BadRequestError:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 401
            message: Unauthorized
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 403
            message: Forbidden
    RateLimitError:
      description: Too many requests
      headers:
        Retry-After:
          description: Seconds to wait
          schema:
            type: integer
        X-RateLimit-Limit:
          description: Max requests
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: Remaining requests
          schema:
            type: integer
        X-RateLimit-Reset:
          description: Reset time
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnsupportedMediaError:
      description: Unsupported media type
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 500
            message: Internal Server Error
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: Internal error code
          example: 400
        message:
          type: string
          description: Human readable error message
          example: Bad Request
    Pet:
      type: object
      required: [id, name, type]
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the pet
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name:
          type: string
          description: Pet name
          maxLength: 100
          example: "Buddy"
        type:
          type: string
          enum: [dog, cat, bird, fish]
          description: Pet species
          example: "dog"
        birthDate:
          type: string
          format: date
          description: Pet's birth date
          example: "2021-01-01"
        ownerEmail:
          type: string
          format: email
          description: Owner's contact email
          example: "mustafa@example.com"
      example:
        id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name: "Buddy"
        type: "dog"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []