openapi: 3.0.3
info:
  title: Sample Pet Store API
  version: 1.0.0
  description: A sample API for testing swagger-sentinel with all rules satisfied.
  contact:
    name: API Team
    email: api@example.com
    url: https://example.com/support
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://example.com/terms

externalDocs:
  description: Find out more about our API
  url: https://example.com/docs

servers:
  - url: https://api.example.com/v1
    description: Production server (HTTPS uses consistent security)

paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      tags:
        - Pets
      parameters:
        - name: limit
          in: query
          description: Maximum number of pets to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: cursor
          in: query
          description: Pagination cursor for pagination support
          schema:
            type: string
      responses:
        '200':
          description: A list of pets
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - total
                properties:
                  items:
                    type: array
                    maxItems: 100
                    items:
                      $ref: '#/components/schemas/Pet'
                  total:
                    type: integer
                    example: 42
        '429':
          description: Too many requests
          headers:
            Retry-After:
              description: Seconds to wait before retrying
              schema:
                type: integer

    post:
      operationId: createPet
      summary: Create a new pet
      tags:
        - Pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetCreate'
      responses:
        '201':
          description: Pet created
          headers:
            Location:
              description: URL of the created resource
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /pets/{petId}:
    parameters:
      - name: petId
        in: path
        required: true
        description: The pet's unique identifier (UUID)
        schema:
          type: string
          format: uuid
    get:
      operationId: getPet
      summary: Get a pet by ID
      tags:
        - Pets
      responses:
        '200':
          description: The pet detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      operationId: deletePet
      summary: Delete a pet
      tags:
        - Pets
      responses:
        '204':
          description: Pet deleted successfully (No body)

components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
        - species
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name:
          type: string
          maxLength: 100
          example: "Buddy"
        species:
          type: string
          enum: [dog, cat, bird, fish]
          example: "dog"
        age:
          type: integer
          minimum: 0
          maximum: 50
          example: 3
        createdAt:
          type: string
          format: date-time

    PetCreate:
      type: object
      required:
        - name
        - species
      properties:
        name:
          type: string
          maxLength: 100
        species:
          type: string
          enum: [dog, cat, bird, fish]

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: "NOT_FOUND"
        message:
          type: string
          example: "Resource not found"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

tags:
  - name: Pets
    description: Pet management operations and resource tracking