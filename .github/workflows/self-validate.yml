name: Self-Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-sample:
    name: Validate sample OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run Swagger Sentinel
        id: sentinel
        uses: ./
        with:
          spec-path: tests/sample-spec.yaml
          strict: false

      - name: Print results summary
        run: |
          echo "Passed  : ${{ steps.sentinel.outputs.passed }}"
          echo "Errors  : ${{ steps.sentinel.outputs.errors }}"
          echo "Warnings: ${{ steps.sentinel.outputs.warnings }}"
          echo "Total   : ${{ steps.sentinel.outputs.total }}"

  unit-tests:
    name: Run tests & checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm install
      - run: npm run lint
      - run: npm run type-check
      - run: npm test -- --coverage

  publish-npm:
    name: Publish to NPM
    needs: [unit-tests, validate-sample]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-vscode:
    name: Publish to VS Code Marketplace
    needs: [unit-tests, validate-sample]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - run: npm install
      - run: npm run build --workspace=packages/vscode
      - name: Publish extension
        run: npx vsce publish --pat ${{ secrets.VSCE_PAT }}
        working-directory: packages/vscode
