name: Self-Validate

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-sample:
    name: Validate sample OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run Swagger Sentinel
        id: sentinel
        uses: ./
        with:
          spec-path: tests/sample-spec.yaml
          strict: false

      - name: Print results summary
        run: |
          echo "Passed  : ${{ steps.sentinel.outputs.passed }}"
          echo "Errors  : ${{ steps.sentinel.outputs.errors }}"
          echo "Warnings: ${{ steps.sentinel.outputs.warnings }}"
          echo "Total   : ${{ steps.sentinel.outputs.total }}"

  breaking-detector-demo:
    name: Run breaking detector demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm install

      - name: Generate breaking summary from example specs
        run: |
          npx tsx packages/core/src/cli.ts breaking \
            docs/examples/breaking-change/old-api.yaml \
            docs/examples/breaking-change/new-api.yaml \
            --summary docs/examples/breaking-change/report.md \
            --fail-on none

      - name: Publish breaking summary
        if: always()
        run: cat docs/examples/breaking-change/report.md >> $GITHUB_STEP_SUMMARY

  unit-tests:
    name: Run tests & checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm install
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test:coverage

      - name: Publish coverage summary
        if: always()
        run: |
          node -e "const fs=require('node:fs'); const p='packages/core/coverage/coverage-summary.json'; if(!fs.existsSync(p)){console.log('Coverage summary not found:', p); process.exit(0);} const s=JSON.parse(fs.readFileSync(p,'utf8')).total; const pct=(v)=>typeof v?.pct==='number'?v.pct.toFixed(2):'0.00'; console.log('## Coverage Summary'); console.log(''); console.log('| Metric | Percent |'); console.log('|---|---:|'); console.log(`| Lines | ${pct(s.lines)}% |`); console.log(`| Functions | ${pct(s.functions)}% |`); console.log(`| Branches | ${pct(s.branches)}% |`); console.log(`| Statements | ${pct(s.statements)}% |`);" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-coverage-html
          path: packages/core/coverage
          if-no-files-found: ignore

  publish-npm:
    name: Publish to NPM
    needs: [unit-tests, validate-sample]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install
      - name: Align core package version with tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version --workspace=packages/core
      - run: npm run build --workspace=packages/core
      - run: npm publish --workspace=packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-vscode:
    name: Publish to VS Code Marketplace
    needs: [unit-tests, validate-sample]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - run: npm install
      - name: Align VS Code extension version with tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version --workspace=packages/vscode
      - run: npm run build --workspace=packages/vscode
      - name: Publish extension
        run: npx vsce publish --pat ${{ secrets.VSCE_PAT }} --no-dependencies
        working-directory: packages/vscode

  publish-github-release:
    name: Publish GitHub Release
    needs: [unit-tests, validate-sample]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" --title "Release $GITHUB_REF_NAME" --notes-file CHANGELOG.md || gh release edit "$GITHUB_REF_NAME" --title "Release $GITHUB_REF_NAME" --notes-file CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
